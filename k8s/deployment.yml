apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudops-pipeline
  namespace: cloudops
  labels:
    app: cloudops-pipeline
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloudops-pipeline
  template:
    metadata:
      labels:
        app: cloudops-pipeline
    spec:
      containers:
        - name: cloudops-pipeline
          image: your-dockerhub-user/cloudops-pipeline:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi

