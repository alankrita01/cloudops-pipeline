apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cloudops-pipeline-ingress
  namespace: cloudops
  annotations:
    kubernetes.io/ingress.class: alb
spec:
  rules:
    - host: cloudops.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cloudops-pipeline-service
                port:
                  number: 80

